<!DOCTYPE html>
<html>
<head>
    <title>Test API MaikPet</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test API MaikPet</h1>
    
    <div class="test">
        <h3>Test 1: get_mascotas.php</h3>
        <button onclick="testGetMascotas()">Probar</button>
        <div id="result1"></div>
    </div>
    
    <div class="test">
        <h3>Test 2: test_db.php</h3>
        <button onclick="testDB()">Probar</button>
        <div id="result2"></div>
    </div>
    
    <div class="test">
        <h3>Test 3: test_endpoints.php</h3>
        <button onclick="testEndpoints()">Probar</button>
        <div id="result3"></div>
    </div>
    
    <div class="test">
        <h3>Test 4: insert_test_data.php</h3>
        <button onclick="insertTestData()">Insertar datos de prueba</button>
        <div id="result4"></div>
    </div>
    
    <script>
        async function testGetMascotas() {
            try {
                const response = await fetch('get_mascotas.php');
                const data = await response.json();
                const resultDiv = document.getElementById('result1');
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.parentElement.className = data.success ? 'test success' : 'test error';
            } catch (error) {
                document.getElementById('result1').innerHTML = `<pre>Error: ${error.message}</pre>`;
                document.getElementById('result1').parentElement.className = 'test error';
            }
        }
        
        async function testDB() {
            try {
                const response = await fetch('test_db.php');
                const data = await response.json();
                const resultDiv = document.getElementById('result2');
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.parentElement.className = data.success ? 'test success' : 'test error';
            } catch (error) {
                document.getElementById('result2').innerHTML = `<pre>Error: ${error.message}</pre>`;
                document.getElementById('result2').parentElement.className = 'test error';
            }
        }
        
        async function testEndpoints() {
            try {
                const response = await fetch('test_endpoints.php');
                const text = await response.text();
                document.getElementById('result3').innerHTML = text;
                document.getElementById('result3').parentElement.className = 'test success';
            } catch (error) {
                document.getElementById('result3').innerHTML = `<pre>Error: ${error.message}</pre>`;
                document.getElementById('result3').parentElement.className = 'test error';
            }
        }
        
        async function insertTestData() {
            try {
                const response = await fetch('insert_test_data.php');
                const data = await response.json();
                const resultDiv = document.getElementById('result4');
                resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.parentElement.className = data.success ? 'test success' : 'test error';
            } catch (error) {
                document.getElementById('result4').innerHTML = `<pre>Error: ${error.message}</pre>`;
                document.getElementById('result4').parentElement.className = 'test error';
            }
        }
    </script>
</body>
</html>
